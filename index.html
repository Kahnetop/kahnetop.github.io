<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2</title>

    <style>
        /* Setup de la page pour un plein écran propre */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        #marmoset-viewer {
            width: 100vw;
            height: 100vh;
        }
    </style>

    <!-- Appel du fichier local que tu as ajouté sur ton GitHub -->
    <script src="marmoset.js"></script>
</head>
<body>

    <!-- Le conteneur où le modèle va s'afficher -->
    <div id="marmoset-viewer"></div>

    <script>
        window.onload = function () {
            if (window.marmoset) {
                // 1. On initialise le viewer dans le div "marmoset-viewer"
                // 2. On passe l'URL du fichier .mview dans les paramètres
                var params = {
                    width: "100%",
                    height: "100%",
                    autoStart: true,
                    fullScreen: true,
                    pageBackgroundColor: "#000"
                };

                // LA LIGNE CRUCIALE : On lie l'ID du div au fichier
                marmoset.embed("marmoset-viewer", "./plushLune.mview", params);

                console.log("Chargement lancé pour : ./plushLune.mview");
            } else {
                console.error("marmoset.js est manquant.");
            }
        };
    </script>

</body>
</html>
