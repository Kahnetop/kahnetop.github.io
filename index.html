<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test1</title>

    <!-- Chargement du moteur Marmoset -->
    <script src="https://viewer.marmoset.co/main/mviewer.js"></script>

    <style>
        /* Supprime les marges et met le fond en noir */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        /* Le container prend tout l'écran*/
        #marmoset-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <!-- Emplacement du viewer -->
    <div id="marmoset-container"></div>

    <script>
        function loadMarmoset() {
            if (typeof mviewer !== 'undefined') {
                // Si le moteur est prêt, on lance le modèle
                var myViewer = new mviewer.Viewer("marmoset-container", "plushLune.mview");
            } else {
                // Sinon, on attend encore 100ms et on réessaye
                setTimeout(loadMarmoset, 100);
            }
        }

        window.onload = loadMarmoset;
    </script>

</body>
</html>
