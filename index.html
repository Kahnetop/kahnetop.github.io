<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio 3D | PlushLune</title>

    <style>
        /* Setup de la page pour un plein écran propre */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        #marmoset-viewer {
            width: 100vw;
            height: 100vh;
        }
    </style>

    <!-- Appel du fichier local que tu as ajouté sur ton GitHub -->
    <script src="marmoset.js"></script>
</head>
<body>

    <!-- Le conteneur où le modèle va s'afficher -->
    <div id="marmoset-viewer"></div>

    <script>
        window.onload = function () {
            if (window.marmoset) {
                // On combine l'initialisation et le chargement du fichier
                // On ajoute "./" devant le nom pour forcer la recherche dans le dossier actuel
                marmoset.embed("marmoset-viewer", {
                    width: "100%",
                    height: "100%",
                    autoStart: true,
                    fullScreen: true,
                    pageBackgroundColor: "#000",
                    url: "./plushLune.mview" // On définit la source ici directement
                });

                console.log("Tentative de chargement du modèle...");
            } else {
                console.error("marmoset.js non trouvé.");
            }
        };
    </script>

</body>
</html>
