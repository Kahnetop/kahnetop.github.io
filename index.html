<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4</title>

    <style>
        /* Setup de la page pour un plein écran propre */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        #marmoset-viewer {
            width: 100vw;
            height: 100vh;
        }
    </style>

    <!-- Appel du fichier local que tu as ajouté sur ton GitHub -->
    <script src="marmoset.js"></script>
</head>
<body>

    <!-- Le conteneur où le modèle va s'afficher -->
    <div id="marmoset-viewer"></div>

    <script>
        window.onload = function () {
            if (window.marmoset) {
                // On définit les paramètres de base
                var params = {
                    width: 100, // On utilise des nombres plutôt que des strings pour la sécurité
                    height: 100,
                    autoStart: true,
                    fullScreen: true,
                    pageBackgroundColor: "#000"
                };

                // LA SYNTAXE LA PLUS ROBUSTE :
                // (ID du div, Chemin du fichier, Paramètres)
                marmoset.embed("plushLune.mview", params);

                console.log("Chargement direct de plushLune.mview...");
            } else {
                console.error("marmoset.js manquant.");
            }
        };
    </script>

</body>
</html>
