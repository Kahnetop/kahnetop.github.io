<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3</title>

    <style>
        /* Setup de la page pour un plein écran propre */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        #marmoset-viewer {
            width: 100vw;
            height: 100vh;
        }
    </style>

    <!-- Appel du fichier local que tu as ajouté sur ton GitHub -->
    <script src="marmoset.js"></script>
</head>
<body>

    <!-- Le conteneur où le modèle va s'afficher -->
    <div id="marmoset-viewer"></div>

    <script>
        window.onload = function () {
            if (window.marmoset) {
                // On définit d'abord les réglages
                var params = {
                    width: "100%",
                    height: "100%",
                    autoStart: true,
                    fullScreen: true,
                    pageBackgroundColor: "#000"
                };

                // ATTENTION : Ici on inverse l'ordre pour corriger ton erreur TypeError
                // On donne : (ID du div, OPTIONS, CHEMIN du modèle)
                marmoset.embed("marmoset-viewer", params, { url: "plushLune.mview" });

                console.log("Tentative finale avec inversion des paramètres...");
            } else {
                console.error("marmoset.js est introuvable.");
            }
        };
    </script>

</body>
</html>
