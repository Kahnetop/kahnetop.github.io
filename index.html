<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portfolio 3D</title>
    <style>
        /* On s'assure que le container prend toute la place sans marges */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #viewer-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <div id="viewer-container"></div>

    <!-- On charge le script APRES le div pour être sûr qu'il trouve le container -->
    <script src="marmoset.js"></script>

    <script>
        // La méthode officielle de haut niveau
        var params = {
            width: "100%",
            height: "100%",
            autoStart: true,
            fullScreen: true,
            pageBackgroundColor: "#000",
            image: "", // Optionnel : une image d'aperçu avant le chargement
        };

        // Sur leur site, ils utilisent souvent l'appel direct au constructeur WebViewer
        try {
            // C'est l'ordre exact utilisé dans les versions récentes du moteur
            marmoset.embed("viewer-container", "plushLune.txt", params);
        } catch (e) {
            console.log("Tentative alternative...");
            // Si la première échoue, on tente la méthode "Auto-Init"
            var v = new marmoset.WebViewer(params, "plushLune.txt");
            document.getElementById("viewer-container").appendChild(v.domRoot);
        }
    </script>
</body>
</html>
