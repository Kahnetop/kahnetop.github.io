<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio 3D | PlushLune</title>

    <style>
        /* Setup de la page pour un plein écran propre */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        #marmoset-viewer {
            width: 100vw;
            height: 100vh;
        }
    </style>

    <!-- Appel du fichier local que tu as ajouté sur ton GitHub -->
    <script src="marmoset.js"></script>
</head>
<body>

    <!-- Le conteneur où le modèle va s'afficher -->
    <div id="marmoset-viewer"></div>

    <script>
        window.onload = function () {
            // On vérifie que marmoset.js est bien présent
            if (window.marmoset) {
                // Configuration et chargement du modèle
                marmoset.embed("marmoset-viewer", {
                    width: "100%",
                    height: "100%",
                    autoStart: true,
                    fullScreen: true,
                    pageBackgroundColor: "#000"
                });

                // IMPORTANT : Le nom exact de ton fichier
                marmoset.load("plushLune.mview");

                console.log("Moteur Marmoset chargé avec succès !");
            } else {
                console.error("Erreur : marmoset.js est introuvable à la racine.");
                document.body.innerHTML = "<h2 style='color:white; text-align:center;'>Erreur : marmoset.js manquant sur le serveur.</h2>";
            }
        };
    </script>

</body>
</html>
